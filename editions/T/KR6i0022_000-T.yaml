body:
  text: 三劫三千佛緣起出觀藥王藥上經宋畺良耶舍譯爾時釋迦牟尼佛告大眾言我曾往昔無數劫時於妙光佛末法之中出家學道聞是五十三佛名聞已合掌心生歡喜復教他人令得聞持他人聞已展轉相教乃至三千人此三千人異口同音稱諸佛名一心敬禮如是敬禮諸佛因緣功德力故即得超越無數億劫生死之罪初千人者華光佛為首下至毘舍浮佛於莊嚴劫得成為佛過去千佛是也其中千人者拘留孫佛為首下至樓至佛於賢劫中次第成佛後千人者日光佛為首下至須彌相佛於星宿劫中當得成佛佛告寶積十方現在諸佛善德如來等亦曾得聞是五十三佛名故於十方面各皆成佛若有眾生欲得除滅四重禁罪欲得懺悔五逆十惡欲得除滅無根謗法極重之罪當勤禮敬五十三佛名號南無普光佛南無普明佛南無普淨佛南無多摩羅跋栴檀香佛南無栴檀光佛南無摩尼幢佛南無歡喜藏摩尼寶積佛南無一切世間樂見上大精進佛南無摩尼幢燈光佛南無慧炬照佛南無海德光明佛南無金剛牢強普散金光佛南無大強精進勇猛佛南無大悲光佛南無慈力王佛南無慈藏佛南無栴檀窟莊嚴勝佛南無賢善首佛南無善意佛南無廣莊嚴王佛南無金華光佛南無寶蓋照空自在力王佛南無虛空寶華光佛南無瑠璃莊嚴王佛南無普現色身光佛南無不動智光佛南無降伏眾魔王佛南無才光明佛南無智慧勝佛南無彌勒仙光佛南無善寂月音妙尊智王佛南無世淨光佛南無龍種上尊王佛南無日月光佛南無日月珠光佛南無慧幢勝王佛南無師子吼自在力王佛南無妙音勝佛南無常光幢佛南無觀世燈佛南無慧威燈王佛南無法勝王佛南無須彌光佛南無須摩那華光佛南無優曇鉢羅花殊勝王佛南無大慧力王佛南無阿閦毘歡喜光佛南無無量音聲王佛南無才光佛南無金海光佛南無山海慧自在通王佛南無大通光佛南無一切法常滿王佛
