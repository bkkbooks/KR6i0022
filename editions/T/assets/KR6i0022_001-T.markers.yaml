  - {type: variant, offset: 6339, length: 727, content: '禮三寶已，次復懺悔。

      「已懺地獄報竟，今當復次懺悔三惡道報。經中佛說：『多欲之人，多求利故，苦惱亦多。知足之人，雖臥地上，猶以為樂；不知足者，雖處天堂，猶不稱意。』但世間人，忽有急難，便能捨財，不計多少；而不知此身，臨於三塗深坑之上，一息不還便應墮落。忽有知識營功福德，令修未來善法資糧，執此慳心無肯作理。夫如此者，極為愚惑。何以故爾？經中佛說：『生時不賷【CB】【麗-CB】，賚【大】賷K12n0391_p1200a24賚一文而來，死亦不持一文而去，苦身積聚為之憂惱，於己無益，徒為他有。無善可恃，無德可怙，致使命終，墮諸惡道。』是故弟子等，今日稽顙，懇到歸依於佛。

      「弟子，今日次復懺悔，畜生道中，無所識知罪報。懺悔畜生道中，負重牽犁，償他宿債罪報。懺悔畜生道中，不得自在，為他斫刺，屠割罪報。懺悔畜生無足、二足、四足、多足罪報。懺悔畜生道中，身諸毛、羽、鱗、甲之內，為諸小虫之所唼食罪報。如是畜生道中，有無量罪報，今日至誠，皆悉懺悔。

      「次復懺悔，餓鬼道中，長飢罪報。懺悔餓鬼，百千萬歲，初不曾聞漿水之名罪報。懺悔餓鬼，食噉膿血，糞穢罪報。懺悔餓鬼，動身之時，一切肢節火然罪報。懺悔餓鬼，腹大咽小罪報。如是餓鬼道中，無量苦報，今日稽顙皆悉懺悔。

      「次復懺悔一切鬼神脩羅道中，諭諂詐稱罪報。懺悔鬼神道中，擔沙負石，填河塞海罪報。懺悔羅剎、鳩槃茶，諸惡鬼神，生噉血肉，受此醜陋罪報。如是鬼神道中，無量無邊，一切罪報，今日稽顙，向十方佛，大地菩薩，求哀懺悔，悉令消滅。

      「願弟子等，承是懺悔畜生等報所生功德，生生世世，滅愚癡垢，自識業緣，智慧明照，斷惡道身。願以懺悔餓鬼等報所生功德，生生世世，永離慳貪飢餓之苦，常飡甘露解脫之味。願以懺悔鬼神、脩羅等報所生功德，生生世世質直無諂，離邪命因，除醜陋果，福利人天。願弟子等，從今以去，乃至道場，決定不受四惡道報，唯除大悲為眾生故，以誓願力，處之無厭禮一拜。」

      南無東方大光曜佛、南無南方虛空住佛、南無西方金剛步佛、南無北方無邊力佛、南無東南方無邊佛、南無西南方壞諸怨賊佛、南無西北方離垢光佛、南無東北方金色光音佛、南無下方師子遊戲佛、南無上方月幢王佛。

      如是十方盡虛空界一切三寶。', 宋: '', 元: '', 宮: '', 聖: ''}
